<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprinkler Diagnosis — PJL Land Services</title>
<meta name="description" content="Talk to Patrick from PJL Land Services about your sprinkler issue. Free AI-powered diagnosis with locked-in repair pricing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/chat-widget.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #F7F4EC;
    color: #1A1A1A;
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .landing {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .landing-card {
    max-width: 480px;
  }
  .landing-icon {
    width: 76px; height: 76px;
    border-radius: 50%;
    background: #E07B24;
    color: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-family: 'Barlow Condensed', system-ui, sans-serif;
    font-size: 38px; font-weight: 800;
    box-shadow: 0 6px 18px rgba(15, 31, 20, .22);
  }
  .landing h1 {
    font-family: 'Barlow Condensed', system-ui, sans-serif;
    font-size: 44px;
    color: #1B4D2E;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .landing p {
    font-size: 16px;
    color: #4A4A4A;
    line-height: 1.55;
    margin-bottom: 26px;
  }
  .landing button {
    background: #E07B24;
    color: #FFFFFF;
    border: none;
    padding: 16px 32px;
    border-radius: 999px;
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, transform .15s;
    box-shadow: 0 4px 14px rgba(224, 123, 36, .3);
  }
  .landing button:hover { background: #F59B4A; transform: translateY(-2px); }
  .landing-back {
    display: inline-block;
    margin-top: 22px;
    font-size: 12px;
    color: #7A7A7A;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid rgba(122,122,122,.3);
  }
  .landing-back:hover { color: #1F4733; border-color: #1F4733; }
</style>
</head>
<body>
  <main class="landing">
    <div class="landing-card">
      <div class="landing-icon">P</div>
      <h1>Talk to Patrick about your sprinkler issue.</h1>
      <p>Describe what's happening in plain English. I'll come back with what's likely going on, what you can try yourself, and an honest read on whether you need a tech.</p>
      <button type="button" data-pjl-chat>Start the Conversation</button>
      <br>
      <a href="index.html" class="landing-back">← Back to PJL Land Services</a>
    </div>
  </main>

  <script src="js/chat-widget.js" defer></script>
  <script>
    // Auto-open the chat panel on this dedicated landing page.
    document.addEventListener("DOMContentLoaded", () => {
      const tryOpen = () => {
        if (window.pjlChat) { window.pjlChat.open(); return true; }
        return false;
      };
      if (!tryOpen()) {
        // Widget script loads with `defer`, so it may not be ready yet.
        const t = setInterval(() => { if (tryOpen()) clearInterval(t); }, 50);
        setTimeout(() => clearInterval(t), 5000);
      }
    });
  </script>
</body>
</html>
