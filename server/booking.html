<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F1F14">
  <title>PJL Booking</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260518" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260518" />
  <link rel="shortcut icon" href="/favicon.ico?v=20260518" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260518" />
  <meta name="apple-mobile-web-app-title" content="PJL" />
  <link rel="manifest" href="/site.webmanifest?v=20260518" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/crm/crm.css">
  <link rel="stylesheet" href="/crm/property.css">
  <link rel="stylesheet" href="/crm/customers.css">
</head>
<body class="pjl-crm-body">
  <aside class="pjl-admin-nav" id="navMenu" aria-label="PJL CRM Navigation">
    <header class="pjl-side-brand">
      <a href="/" class="pjl-side-logo"><img src="/crm/pjl-logo.svg" alt="PJL Land Services"></a>
    </header>
    <div class="pjl-nav-links">
      <a href="/admin/today">Today</a>
      <a href="/admin/messages">Messages <span class="pjl-nav-badge" data-portal-msg-badge hidden></span></a>
      <a href="/admin">CRM</a>
      <a href="/admin/schedule">Schedule</a>
      <a href="/admin/handoff">Handoff</a>
      <a href="/admin/outreach">Outreach</a>
      <a href="/admin/bookings" class="is-active">Bookings</a>
      <a href="/admin/customers">Customers</a>
      <a href="/admin/properties">Properties</a>
      <a href="/admin/projects">Projects</a>
      <a href="/admin/work-orders">Work orders</a>
      <a href="/admin/quote-folder">Quotes</a>
      <a href="/admin/invoices">Invoices</a>
      <a href="/admin/material-lists">Materials</a>
      <a href="/admin/chats">AI Chats</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/settings">Settings</a>
    </div>
    <footer class="pjl-side-footer">
      <a class="pjl-side-phone" href="tel:+19059600181">(905) 960-0181</a>
      <button class="pjl-nav-logout" type="button" id="logoutButton">Log out</button>
    </footer>
  </aside>

  <div class="pjl-app">
    <header class="pjl-app-topbar">
      <button class="pjl-nav-toggle" type="button" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navMenu">
        <span class="pjl-nav-toggle-bar"></span>
        <span class="pjl-nav-toggle-bar"></span>
        <span class="pjl-nav-toggle-bar"></span>
      </button>
      <span class="pjl-app-title" id="bookingTitle">Booking</span>
      <a class="pjl-app-phone" href="tel:+19059600181">(905) 960-0181</a>
    </header>

    <main class="pjl-crm-shell">
      <p style="margin: 16px 0 0;"><a href="/admin/bookings" style="text-decoration: none; color: var(--crm-muted, #666); font-size: 13px;">← All bookings</a></p>

      <section id="bookingProfile" class="customer-profile" hidden>
        <aside class="customer-summary">
          <h2 id="summaryId">—</h2>
          <span class="customer-status" id="summaryStatus">confirmed</span>

          <div class="customer-summary-field">
            <label>Customer</label>
            <div class="value" id="summaryCustomer">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Property</label>
            <div class="value" id="summaryProperty">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Service</label>
            <div class="value" id="summaryService">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Scheduled for</label>
            <div class="value" id="summaryScheduled">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Duration</label>
            <div class="value" id="summaryDuration">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Address</label>
            <div class="value" id="summaryAddress">—</div>
          </div>
          <div class="customer-summary-field">
            <label>Status</label>
            <select id="statusSelect">
              <option value="confirmed">Confirmed</option>
              <option value="tentative">Tentative</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
              <option value="no_show">No-show</option>
            </select>
          </div>
          <div class="customer-summary-field">
            <label>Prep notes (visible to tech)</label>
            <textarea id="prepNotes" rows="4" maxlength="2000" placeholder="Gate code, dog warning, hidden valve box…"></textarea>
          </div>
          <div class="customer-summary-actions">
            <button type="button" class="pjl-btn pjl-btn-primary" id="saveBtn" disabled>Save</button>
            <button type="button" class="pjl-btn pjl-btn-outline" id="revertBtn" disabled>Revert</button>
          </div>
          <p class="customer-modal-error" id="saveError" hidden></p>
        </aside>

        <section class="customer-tabs">
          <nav class="customer-tab-headers" role="tablist">
            <button type="button" class="customer-tab-header is-active" data-tab="workOrders" role="tab">Work orders <span class="count" id="countWorkOrders">0</span></button>
            <button type="button" class="customer-tab-header" data-tab="quote" role="tab">Source quote</button>
            <button type="button" class="customer-tab-header" data-tab="history" role="tab">History <span class="count" id="countHistory">0</span></button>
          </nav>
          <div class="customer-tab-panel" data-tab="workOrders">
            <div id="panelWorkOrders"></div>
          </div>
          <div class="customer-tab-panel" data-tab="quote" hidden>
            <div id="panelQuote"></div>
          </div>
          <div class="customer-tab-panel" data-tab="history" hidden>
            <div id="panelHistory"></div>
          </div>
        </section>
      </section>

      <p id="loadError" hidden style="margin: 32px; text-align: center; color: #9b2b2b;"></p>
    </main>
  </div>

  <script src="/crm/booking.js"></script>
  <script src="/crm/nav-badges.js?v=1"></script>
</body>
</html>
