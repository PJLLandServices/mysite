<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice — PJL</title>
  <link rel="icon" type="image/svg+xml" href="/crm/pjl-logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/crm/crm.css">
  <link rel="stylesheet" href="/crm/invoice.css">
</head>
<body class="pjl-crm-body invoice-body">
  <aside class="pjl-admin-nav" id="navMenu" aria-label="PJL CRM Navigation">
    <header class="pjl-side-brand">
      <a href="/" class="pjl-side-logo"><img src="/crm/pjl-logo.svg" alt="PJL Land Services"></a>
    </header>
    <div class="pjl-nav-links">
      <a href="/admin/today">Today</a>
      <a href="/admin">CRM</a>
      <a href="/admin/schedule">Schedule</a>
      <a href="/admin/handoff">Handoff</a>
      <a href="/admin/properties">Properties</a>
      <a href="/admin/quote-folder">Quotes</a>
      <a href="/admin/invoices" class="is-active">Invoices</a>
      <a href="/admin/chats">AI Chats</a>
      <a href="/admin/settings">Settings</a>
    </div>
    <footer class="pjl-side-footer">
      <a class="pjl-side-phone" href="tel:+19059600181">(905) 960-0181</a>
      <button class="pjl-nav-logout" type="button" id="logoutButton">Log out</button>
    </footer>
  </aside>

  <div class="pjl-app">
    <header class="pjl-app-topbar">
      <button class="pjl-nav-toggle" type="button" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navMenu">
        <span class="pjl-nav-toggle-bar"></span>
        <span class="pjl-nav-toggle-bar"></span>
        <span class="pjl-nav-toggle-bar"></span>
      </button>
      <span class="pjl-app-title" id="invoiceTitle">Invoice —</span>
      <a class="pjl-app-phone" href="tel:+19059600181">(905) 960-0181</a>
    </header>

    <main class="invoice-shell">
      <p class="invoice-back"><a href="/admin/invoices">← All invoices</a></p>
      <p class="invoice-loading" id="invoiceLoading">Loading…</p>
      <article class="invoice-card" id="invoiceCard" hidden>
        <header class="invoice-head">
          <div>
            <span class="invoice-eyebrow">PJL Land Services</span>
            <h2 id="invoiceId">I-2026-0000</h2>
            <p class="invoice-meta" id="invoiceMeta"></p>
          </div>
          <div class="invoice-status-block">
            <select id="invoiceStatus" class="invoice-status-select">
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="paid">Paid</option>
              <option value="void">Void</option>
            </select>
            <p class="invoice-status-meta" id="invoiceStatusMeta"></p>
          </div>
        </header>
        <section class="invoice-customer">
          <h3>Bill to</h3>
          <p id="invoiceCustomerName"></p>
          <p id="invoiceCustomerAddress" class="invoice-customer-sub"></p>
          <p id="invoiceCustomerContact" class="invoice-customer-sub"></p>
        </section>
        <section class="invoice-lines">
          <h3>Line items</h3>
          <table class="invoice-line-table">
            <thead>
              <tr><th>Description</th><th>Qty</th><th>Unit</th><th>Total</th></tr>
            </thead>
            <tbody id="invoiceLines"></tbody>
          </table>
        </section>
        <section class="invoice-totals">
          <div><span>Subtotal</span><strong id="invoiceSubtotal">$0.00</strong></div>
          <div><span>HST (13%)</span><strong id="invoiceHst">$0.00</strong></div>
          <div class="invoice-totals-row"><span>Total CAD</span><strong id="invoiceTotal">$0.00</strong></div>
        </section>
        <section class="invoice-notes">
          <label for="invoiceNotes">Internal notes</label>
          <textarea id="invoiceNotes" rows="3" placeholder="Optional notes (visible to admin only)"></textarea>
          <button type="button" id="invoiceSaveNotes" class="invoice-btn">Save notes</button>
        </section>
        <section class="invoice-links">
          <p>Linked: <a id="invoiceWoLink" href="#">—</a> · <a id="invoicePropertyLink" href="#">—</a></p>
        </section>
      </article>
    </main>
  </div>

  <script src="/crm/crm-nav.js"></script>
  <script src="/crm/invoice.js"></script>
</body>
</html>
